<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div class="container formulario-container">
        <form id="formulario-pedido">

            <div class="row mb-3">
                <h4>Dados Básicos</h4>
            </div>

            <div class="row g-3">
                <div class="col-md-3">
                    <input type="text" class="form-control" id="nome" placeholder="Nome">
                </div>

                <div class="col-md-5">
                    <input type="text" class="form-control" placeholder="Sobrenome">
                </div>

                <div class="col-md-4">
                    <input type="email" class="form-control" placeholder="E-mail">
                </div>
            </div>

            <div class="row mt-5 mb-3">
                <h4>Dados da entrega</h4>
            </div>

            <div class="row g-3 mb-5 align-items-center">
                <div class="col-md-3 d-flex gap-2">
                    <input type="text" class="form-control" placeholder="CEP" id="cep">

                    <button type="button" class="btn btn-primary" id="btn-buscar-cep">
                        <i class="bi bi-search"></i>
                        <span class="d-none spinner-border spinner-border-sm"></span>
                    </button>
                </div>

                <div class="col-md-7">
                    <input type="text" class="form-control" placeholder="Endereço" id="endereco">
                </div>

                <div class="col-md-2">
                    <input type="number" class="form-control" placeholder="Número">
                </div>
            </div>

            <button type="submit" class="btn btn-success btn-enviar">
                Enviar pedido
            </button>

        </form>
    </div>

    <script src="jquery.js"></script>
    <script src="jquery.mask.min.js"></script>
    <script src="main.js"></script>

</body>
</html>
